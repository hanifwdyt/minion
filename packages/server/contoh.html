<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0f0f1a;
      font-family: 'Segoe UI', sans-serif;
    }

    .container {
      background: #1a1a2e;
      border-radius: 16px;
      padding: 32px;
      width: 400px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    h1 {
      color: #eee;
      font-size: 24px;
      margin-bottom: 24px;
      text-align: center;
    }

    .input-group {
      display: flex;
      gap: 8px;
      margin-bottom: 24px;
    }

    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #2a2a4a;
      border-radius: 10px;
      background: #0f0f1a;
      color: #eee;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      border-color: #e94560;
    }

    button {
      padding: 12px 20px;
      background: linear-gradient(135deg, #e94560, #0f3460);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      cursor: pointer;
      transition: opacity 0.2s;
    }

    button:hover {
      opacity: 0.85;
    }

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: #16213e;
      border-radius: 10px;
      transition: opacity 0.3s;
    }

    .todo-item.done {
      opacity: 0.5;
    }

    .todo-item.done .todo-text {
      text-decoration: line-through;
    }

    .todo-check {
      width: 20px;
      height: 20px;
      border: 2px solid #e94560;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s;
    }

    .todo-item.done .todo-check {
      background: #e94560;
    }

    .todo-text {
      flex: 1;
      color: #ccc;
      font-size: 14px;
    }

    .todo-delete {
      background: none;
      border: none;
      color: #555;
      font-size: 18px;
      cursor: pointer;
      padding: 0 4px;
      transition: color 0.2s;
    }

    .todo-delete:hover {
      color: #e94560;
    }

    .empty {
      text-align: center;
      color: #555;
      font-size: 14px;
      padding: 20px 0;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo List</h1>
    <div class="input-group">
      <input type="text" id="todoInput" placeholder="Mau ngapain hari ini?" onkeydown="if(event.key==='Enter') addTodo()">
      <button onclick="addTodo()">Tambah</button>
    </div>
    <ul class="todo-list" id="todoList">
      <li class="empty" id="emptyMsg">Belum ada tugas. Santai dulu~</li>
    </ul>
  </div>

  <script>
    const todos = [];

    function render() {
      const list = document.getElementById('todoList');
      const empty = document.getElementById('emptyMsg');

      list.innerHTML = '';

      if (todos.length === 0) {
        list.innerHTML = '<li class="empty">Belum ada tugas. Santai dulu~</li>';
        return;
      }

      todos.forEach((todo, i) => {
        const li = document.createElement('li');
        li.className = 'todo-item' + (todo.done ? ' done' : '');
        li.innerHTML = `
          <div class="todo-check" onclick="toggle(${i})"></div>
          <span class="todo-text">${escapeHtml(todo.text)}</span>
          <button class="todo-delete" onclick="remove(${i})">×</button>
        `;
        list.appendChild(li);
      });
    }

    function addTodo() {
      const input = document.getElementById('todoInput');
      const text = input.value.trim();
      if (!text) return;

      todos.push({ text, done: false });
      input.value = '';
      render();
    }

    function toggle(index) {
      todos[index].done = !todos[index].done;
      render();
    }

    function remove(index) {
      todos.splice(index, 1);
      render();
    }

    function escapeHtml(str) {
      const div = document.createElement('div');
      div.textContent = str;
      return div.innerHTML;
    }
  </script>
</body>
</html>
